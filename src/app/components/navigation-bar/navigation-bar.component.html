          <div class="flex flex-col items-center space-y-3 py-3">

                  />

      <div class="flex h-18 w-full items-center justify-between pl-4 pr-1">
        <p class="capitalize text-base tracking-wider text-slate-800 dark:text-navy-100">
          {{  getPageIN(currentPage.replace('-',' ')) }}
        </p>
        <button (click)="isSidebarShow = false; isProfileShow = false" class="sidebar-close btn h-7 w-7 rounded-full p-0 text-primary hover:bg-slate-300/20 focus:bg-slate-300/20 active:bg-slate-300/25 dark:text-accent-light/80 dark:hover:bg-navy-300/20 dark:focus:bg-navy-300/20 dark:active:bg-navy-300/25 xl:hidden">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
        </button>
      </div>

          </li>
        </ul>
