
<ion-content [fullscreen]= "true" x-data class="is-header-blur" x-bind="$store.global.documentBody">
  <!-- Page Wrapper -->
  <div id="root" class="min-h-100vh flex grow bg-slate-50 dark:bg-navy-900">
    <div class="fixed top-0 hidden p-6 lg:block lg:px-12">
      <a href="#" class="flex items-center space-x-2">
        <img class="h-12 w-12" src="../../assets/images/app-logo.svg" alt="logo" />
        <p class="text-xl font-semibold uppercase text-slate-700 dark:text-navy-100">PT XYZ</p>
      </a>
    </div>
    <div class="hidden w-full place-items-center lg:grid">
      <div class="w-full max-w-lg p-6">
        <!-- <img
          class="w-full"
          x-show="!$store.global.isDarkModeEnabled"
          src="../../assets/images/illustrations/dashboard-meet.svg"
          alt="image"
        /> -->
        <img
          class="w-full"
          x-show="$store.global.isDarkModeEnabled"
          src="../../assets/images/illustrations/dashboard-meet-dark.svg"
          alt="image"
        />
      </div>
    </div>
    <main
      class="flex w-full flex-col items-center bg-white dark:bg-navy-700 lg:max-w-md"
    >
      <div class="flex w-full max-w-sm grow flex-col justify-center p-5">
        <div class="text-center">
          <img
            class="mx-auto h-16 w-16 lg:hidden"
            src="../../assets/images/app-logo.svg"
            alt="logo"
          />
          <div class="mt-4">
            <h2 class="text-2xl font-semibold text-slate-600 dark:text-navy-100">
              Selamat Datang di PT XYZ
            </h2>
            <p class="text-slate-400 dark:text-navy-300">
              Silakan masuk untuk melanjutkan
            </p>
          </div>
        </div>

        <div class="mt-4 space-y-4">
          <label class="relative flex">
            <input
              class="form-input peer w-full rounded-lg bg-slate-150 px-3 py-2 pl-9 ring-primary/50 placeholder:text-slate-400 hover:bg-slate-200 focus:ring dark:bg-navy-900/90 dark:ring-accent/50 dark:placeholder:text-navy-300 dark:hover:bg-navy-900 dark:focus:bg-navy-900 dark:text-slate-200"
              placeholder="Username"
              type="text"
              [(ngModel)] = "username"
            />
            <span
              class="pointer-events-none absolute flex h-full w-10 items-center justify-center text-slate-400 peer-focus:text-primary dark:text-navy-300 dark:peer-focus:text-accent"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 transition-colors duration-200"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
            </span>
          </label>
          <label class="relative flex">
            <input
              class="form-input peer w-full rounded-lg bg-slate-150 px-3 py-2 pl-9 ring-primary/50 placeholder:text-slate-400 hover:bg-slate-200 focus:ring dark:bg-navy-900/90 dark:ring-accent/50 dark:placeholder:text-navy-300 dark:hover:bg-navy-900 dark:focus:bg-navy-900 dark:text-slate-200"
              placeholder="Password"
              type="{{ isShowPassword ? 'text' : 'password' }}"
              [(ngModel)]= "password"
            />
            <span class="pointer-events-none absolute flex h-full w-10 items-center justify-center text-slate-400 peer-focus:text-primary dark:text-navy-300 dark:peer-focus:text-accent">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 transition-colors duration-200"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                />
              </svg>
            </span>
          </label>
          <div class="mt-4 flex items-center space-x-2">
            <input class="form-checkbox is-basic h-5 w-5 rounded border-slate-400/70 checked:border-primary checked:bg-primary hover:border-primary focus:border-primary dark:border-navy-400 dark:checked:border-accent dark:checked:bg-accent dark:hover:border-accent dark:focus:border-accent" type="checkbox"[(ngModel)] = "isShowPassword"/>
            <p class="text-slate-600 dark:text-navy-100">
              Lihat Password
            </p>
          </div>
          <div *ngIf='isError' id="alert-dismissable-1" data-dismiss-class="opacity-0 transition-opacity duration-300" class="alert dark:bg-dark/20 flex items-center justify-between overflow-hidden rounded-lg border border-danger text-danger">
            <div class="flex">
              <div class="bg-danger p-3 text-white">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                  />
                </svg>
              </div>
              <div class="px-4 py-3 sm:px-5">{{ messageError }}</div>
            </div>
            <div class="px-2">
              <button (click)="clearError()" data-remove-alert class="btn h-7 w-7 rounded-full p-0 font-medium text-danger hover:bg-danger/20 focus:bg-danger/20 active:bg-danger/25">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div [ngClass]="{'hidden':!isLoadingProcess}" class="mt-5 mx-auto spinner is-elastic h-7 w-7 animate-spin rounded-full border-[3px] border-primary border-r-transparent dark:border-accent dark:border-r-transparent"></div>
        <button (click)="login()" [ngClass]="{'hidden':isLoadingProcess}" class="rounded btn mt-4 h-10 w-full bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
          Masuk
        </button>
      </div>
    </main>
  </div>
</ion-content>
